components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    PatientFeatures:
      example:
        features:
          CBC_Hgb: 7.5
          Ca: 130.0
          a_glob: 8.0
          creat: 35.0
          g_glob: 35.0
          prot_rate: 120.0
      properties:
        features:
          additionalProperties:
            type: number
          title: Features
          type: object
      required:
      - features
      title: PatientFeatures
      type: object
    PredictionResponse:
      properties:
        disclaimer:
          title: Disclaimer
          type: string
        predicted_stage:
          title: Predicted Stage
          type: string
        probabilities:
          additionalProperties:
            type: number
          title: Probabilities
          type: object
      required:
      - predicted_stage
      - probabilities
      - disclaimer
      title: PredictionResponse
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
info:
  description: "\n    Predicts the clinical stage of Multiple Myeloma patients \n\
    \    using the Durie-Salmon staging system.\n    \n    Model: Random Forest trained\
    \ on MM-dataset (Tlemcen, Algeria 2008-2019).\n    Explainability: SHAP analysis\
    \ available in notebooks/03_explainability.ipynb.\n    \n    ⚠️ This is a proof\
    \ of concept. Not intended for clinical use.\n    "
  title: Multiple Myeloma Stage Prediction API
  version: 1.0.0
openapi: 3.1.0
paths:
  /features:
    get:
      operationId: get_features_features_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Get Features
  /health:
    get:
      operationId: health_check_health_get
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health Check
  /predict:
    post:
      operationId: predict_predict_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientFeatures'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictionResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Predict
